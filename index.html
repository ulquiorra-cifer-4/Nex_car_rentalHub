<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nex.RentalHub — Drive the Future</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #e8c96a;
      --dark: #0d0d0d;
      --dark-2: #141414;
      --dark-3: #1c1c1c;
      --dark-4: #252525;
      --text-muted-custom: #888;
      --border: rgba(255,255,255,0.07);
      --card-radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--dark);
      color: #e8e8e8;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      min-height: 100vh;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--dark-2); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

    /* ── Navbar ── */
    .nex-nav {
      background: rgba(13,13,13,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 0.75rem 0;
    }
    .nex-nav .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.7rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: 2px;
    }
    .nex-nav .brand span { color: var(--gold); }
    .nav-link-custom {
      color: #bbb;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 6px 14px;
      border-radius: 8px;
      transition: all 0.2s;
      cursor: pointer;
      letter-spacing: 0.3px;
    }
    .nav-link-custom:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .nav-link-custom.active { color: var(--gold); }
    .btn-gold {
      background: linear-gradient(135deg, var(--gold), #a8872e);
      color: #000;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      padding: 8px 20px;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .btn-gold:hover { background: linear-gradient(135deg, var(--gold-light), var(--gold)); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(201,168,76,0.3); }

    /* ── Hero Carousel ── */
    .hero-carousel { position: relative; height: 580px; overflow: hidden; background: #000; }
    .hero-slide {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 0.8s ease;
      background-size: cover;
      background-position: center;
    }
    .hero-slide.active { opacity: 1; }
    .hero-slide::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(105deg, rgba(0,0,0,0.75) 40%, rgba(0,0,0,0.2) 100%);
    }
    .hero-content {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 2;
      padding: 3rem;
    }
    .hero-tag {
      display: inline-block;
      background: var(--gold);
      color: #000;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 4px;
      margin-bottom: 12px;
    }
    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      line-height: 1;
      color: #fff;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .hero-subtitle { color: rgba(255,255,255,0.65); font-size: 1rem; font-weight: 300; }
    .hero-dots { position: absolute; bottom: 1.5rem; right: 2rem; z-index: 3; display: flex; gap: 8px; }
    .hero-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: all 0.3s; border: none; padding: 0; }
    .hero-dot.active { background: var(--gold); width: 24px; border-radius: 4px; }

    /* ── Filter Bar ── */
    .filter-bar {
      background: var(--dark-3);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 0;
      position: sticky;
      top: 62px;
      z-index: 900;
    }
    .filter-select, .filter-input {
      background: var(--dark-4);
      border: 1px solid var(--border);
      color: #e8e8e8;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s;
      width: 100%;
      height: 40px;
    }
    .filter-select:focus, .filter-input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
      background: var(--dark-4);
      color: #fff;
    }
    .filter-select option { background: var(--dark-3); }
    .filter-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted-custom);
      margin-bottom: 5px;
      display: block;
    }
    .btn-filter-reset {
      background: transparent;
      border: 1px solid var(--border);
      color: #888;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      height: 40px;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
    }
    .btn-filter-reset:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Section ── */
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 2px;
      color: #fff;
    }
    .section-title span { color: var(--gold); }
    .section-sub { color: var(--text-muted-custom); font-size: 0.9rem; font-weight: 300; }

    /* ── Car Card ── */
    .car-card {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .car-card:hover {
      transform: translateY(-6px);
      border-color: rgba(201,168,76,0.3);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .car-img-wrap {
      position: relative;
      height: 210px;
      overflow: hidden;
      background: var(--dark-4);
    }
    .car-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .car-card:hover .car-img-wrap img { transform: scale(1.05); }
    .car-badge {
      position: absolute; top: 12px; left: 12px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      color: var(--gold);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(201,168,76,0.25);
    }
    .avail-dot {
      position: absolute; top: 12px; right: 12px;
      width: 10px; height: 10px; border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.5);
    }
    .avail-dot.yes { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.5); }
    .avail-dot.no { background: #f87171; box-shadow: 0 0 8px rgba(248,113,113,0.5); }
    .car-body { padding: 1.1rem; flex: 1; display: flex; flex-direction: column; }
    .car-name { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 8px; line-height: 1.3; }
    .car-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .car-meta-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.78rem; color: var(--text-muted-custom);
    }
    .car-meta-item i { font-size: 0.85rem; }
    .car-price-row { display: flex; align-items: flex-end; justify-content: space-between; margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); }
    .car-price { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--gold); letter-spacing: 1px; line-height: 1; }
    .car-price-label { font-size: 0.72rem; color: var(--text-muted-custom); }
    .btn-book {
      background: linear-gradient(135deg, var(--gold), #a8872e);
      color: #000;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-book:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(201,168,76,0.35); }
    .btn-book:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* ── Modals ── */
    .modal-backdrop-custom {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      z-index: 1050;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-box {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 40px 100px rgba(0,0,0,0.7);
    }
    .modal-box.wide { max-width: 600px; }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-header-custom {
      padding: 1.5rem 1.5rem 0;
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .modal-title-custom {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 1.5px;
      color: #fff;
    }
    .modal-close {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: #888;
      width: 34px; height: 34px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .modal-close:hover { color: #fff; background: rgba(255,255,255,0.1); }
    .modal-body-custom { padding: 1.2rem 1.5rem 1.5rem; }
    .form-group-custom { margin-bottom: 1rem; }
    .form-label-custom { font-size: 0.78rem; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted-custom); margin-bottom: 6px; display: block; }
    .form-control-custom {
      background: var(--dark-4);
      border: 1px solid var(--border);
      color: #e8e8e8;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      width: 100%;
      transition: all 0.2s;
    }
    .form-control-custom:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
      background: var(--dark-4);
      color: #fff;
    }
    .form-control-custom::placeholder { color: #555; }
    .form-control-custom::-webkit-calendar-picker-indicator { filter: invert(0.6); }
    .divider-text { text-align: center; color: var(--text-muted-custom); font-size: 0.8rem; margin: 0.8rem 0; position: relative; }
    .divider-text::before, .divider-text::after { content: ''; position: absolute; top: 50%; width: 38%; height: 1px; background: var(--border); }
    .divider-text::before { left: 0; }
    .divider-text::after { right: 0; }
    .btn-outline-light-custom {
      background: transparent;
      border: 1px solid var(--border);
      color: #ccc;
      border-radius: 10px;
      padding: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      transition: all 0.2s;
      text-align: center;
    }
    .btn-outline-light-custom:hover { border-color: var(--gold); color: var(--gold); }
    .modal-switch { font-size: 0.85rem; text-align: center; color: var(--text-muted-custom); margin-top: 1rem; }
    .modal-switch a { color: var(--gold); cursor: pointer; text-decoration: none; }
    .modal-switch a:hover { text-decoration: underline; }

    /* Price Summary Box */
    .price-box {
      background: var(--dark-4);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin: 1rem 0;
    }
    .price-box-row { display: flex; justify-content: space-between; font-size: 0.88rem; margin-bottom: 6px; color: #aaa; }
    .price-box-total { display: flex; justify-content: space-between; padding-top: 10px; border-top: 1px solid var(--border); }
    .price-box-total-label { font-weight: 600; color: #fff; }
    .price-box-total-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--gold); letter-spacing: 1px; }

    /* Car mini-header in booking modal */
    .booking-car-header {
      display: flex; gap: 14px; align-items: center;
      background: var(--dark-4);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 1.2rem;
      border: 1px solid var(--border);
    }
    .booking-car-thumb {
      width: 80px; height: 56px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .booking-car-name { font-weight: 600; color: #fff; font-size: 0.95rem; }
    .booking-car-sub { font-size: 0.78rem; color: var(--text-muted-custom); margin-top: 2px; }

    /* ── My Bookings Page ── */
    .page-header {
      background: linear-gradient(135deg, var(--dark-2), var(--dark-3));
      border-bottom: 1px solid var(--border);
      padding: 3rem 0 2rem;
    }
    .booking-item {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 1.2rem;
      margin-bottom: 1rem;
      display: flex;
      gap: 1.2rem;
      align-items: center;
      transition: all 0.2s;
    }
    .booking-item:hover { border-color: rgba(201,168,76,0.2); }
    .booking-thumb { width: 110px; height: 75px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
    .booking-info { flex: 1; min-width: 0; }
    .booking-car-title { font-weight: 600; color: #fff; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .booking-dates { font-size: 0.82rem; color: var(--text-muted-custom); margin-top: 4px; }
    .booking-price { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--gold); letter-spacing: 1px; }
    .status-pill {
      display: inline-block;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      padding: 3px 10px; border-radius: 20px;
      margin-top: 5px;
    }
    .status-pending { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }
    .status-confirmed { background: rgba(74,222,128,0.12); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
    .status-cancelled { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }

    /* ── Empty States / Loaders ── */
    .empty-state { text-align: center; padding: 5rem 1rem; }
    .empty-icon { font-size: 3.5rem; color: var(--dark-4); margin-bottom: 1rem; }
    .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 1px; color: #444; }
    .empty-sub { color: #555; font-size: 0.9rem; }
    .spinner-gold { color: var(--gold); width: 3rem; height: 3rem; }

    /* ── Toast ── */
    .toast-container-custom {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      z-index: 9999; display: flex; flex-direction: column; gap: 10px;
    }
    .toast-item {
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 18px;
      display: flex; align-items: center; gap: 10px;
      min-width: 280px; max-width: 360px;
      animation: slideUp 0.3s ease;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    .toast-item.success { border-left: 3px solid #4ade80; }
    .toast-item.error { border-left: 3px solid #f87171; }
    .toast-item.info { border-left: 3px solid var(--gold); }
    .toast-icon { font-size: 1.1rem; flex-shrink: 0; }
    .toast-item.success .toast-icon { color: #4ade80; }
    .toast-item.error .toast-icon { color: #f87171; }
    .toast-item.info .toast-icon { color: var(--gold); }
    .toast-msg { font-size: 0.88rem; color: #ddd; }

    /* ── Footer ── */
    .site-footer {
      background: var(--dark-2);
      border-top: 1px solid var(--border);
      padding: 2rem 0;
      margin-top: 5rem;
      text-align: center;
      color: #444;
      font-size: 0.82rem;
    }
    .site-footer .brand { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 2px; color: #555; margin-bottom: 4px; }

    /* ── Utilities ── */
    .gap-10 { gap: 10px; }
    .text-gold { color: var(--gold); }
    .alert-custom {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      color: #f87171;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .alert-custom-success {
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.25);
      color: #4ade80;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 576px) {
      .hero-carousel { height: 400px; }
      .hero-content { padding: 1.5rem; }
      .booking-item { flex-direction: column; align-items: flex-start; }
      .booking-thumb { width: 100%; height: 140px; }
    }
  </style>
</head>
<body>

<div id="root"></div>

<!-- React & Dependencies via CDN -->
<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios@1.7.2/dist/axios.min.js"></script>

<!-- React Router DOM v5 via CDN -->
<script src="https://cdn.jsdelivr.net/npm/react-router-dom@5.3.4/umd/react-router-dom.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;
const { BrowserRouter, Route, Switch, Link, useHistory, useLocation } = ReactRouterDOM;

const API = 'https://nex-rental-hub.onrender.com/api';

// ──────────────────────────────────────────────────────────────────────────────
// CONTEXT
// ──────────────────────────────────────────────────────────────────────────────
const AppContext = createContext();

function AppProvider({ children }) {
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('nex_user')); } catch { return null; }
  });
  const [toasts, setToasts] = useState([]);

  const toast = useCallback((msg, type = 'info') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);

  const login = (userData) => {
    setUser(userData);
    localStorage.setItem('nex_user', JSON.stringify(userData));
  };
  const logout = () => {
    setUser(null);
    localStorage.removeItem('nex_user');
  };

  return (
    <AppContext.Provider value={{ user, login, logout, toast }}>
      {children}
      <ToastContainer toasts={toasts} />
    </AppContext.Provider>
  );
}

function useApp() { return useContext(AppContext); }

// ──────────────────────────────────────────────────────────────────────────────
// TOAST
// ──────────────────────────────────────────────────────────────────────────────
function ToastContainer({ toasts }) {
  const icons = { success: 'bi-check-circle-fill', error: 'bi-x-circle-fill', info: 'bi-info-circle-fill' };
  return (
    <div className="toast-container-custom">
      {toasts.map(t => (
        <div key={t.id} className={`toast-item ${t.type}`}>
          <i className={`bi ${icons[t.type] || icons.info} toast-icon`}></i>
          <span className="toast-msg">{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────────
// NAVBAR
// ──────────────────────────────────────────────────────────────────────────────
function Navbar({ onAuthClick }) {
  const { user, logout, toast } = useApp();
  const history = useHistory();
  const location = useLocation();

  const handleLogout = () => {
    logout();
    toast('Logged out successfully', 'info');
    history.push('/');
  };

  return (
    <nav className="nex-nav">
      <div className="container">
        <div className="d-flex align-items-center justify-content-between">
          <Link to="/" className="brand">NEX<span>.</span>RENTALHUB</Link>

          <div className="d-flex align-items-center gap-2">
            <Link to="/" className={`nav-link-custom ${location.pathname === '/' ? 'active' : ''}`}>

// BOOKING MODAL
// ──────────────────────────────────────────────────────────────────────────────
function BookingModal({ car, onClose, onAuthNeeded }) {
  const { user, toast } = useApp();
  const [startDate, setStartDate] = useState('');
  const [endDate, setEndDate]     = useState('');
  const [loading, setLoading]     = useState(false);
  const [error, setError]         = useState('');
  const [success, setSuccess]     = useState(false);

  const today = new Date().toISOString().split('T')[0];

  const days = (() => {
    if (!startDate || !endDate) return 0;
    const d = Math.ceil((new Date(endDate) - new Date(startDate)) / 86400000);
    return d > 0 ? d : 0;
  })();

  const totalPrice = days * car.pricePerDay;

  const handleSubmit = async () => {
    if (!user) { onClose(); onAuthNeeded(); return; }
    if (!startDate || !endDate) { setError('Please select both dates.'); return; }
    if (days <= 0) { setError('End date must be after start date.'); return; }
    setError('');
    setLoading(true);
    try {
      await axios.post(`${API}/bookings`, {
        carId: car._id,
        userEmail: user.email,
        startDate,
        endDate,
      });
      setSuccess(true);
      toast(`Booking confirmed for ${car.name}!`, 'success');
    } catch (e) {
      setError(e.response?.data?.message || 'Booking failed. Please try again.');
    } finally {
      setLoading(false);
    }
  };

  if (success) {
    return (
      <div className="modal-backdrop-custom" onClick={onClose}>
        <div className="modal-box" onClick={e => e.stopPropagation()}>
          <div className="modal-body-custom text-center" style={{ padding: '3rem 2rem' }}>
            <div style={{ fontSize: '3.5rem', color: '#4ade80', marginBottom: '1rem' }}>
              <i className="bi bi-check-circle-fill"></i>
            </div>
            <div className="modal-title-custom" style={{ marginBottom: '0.5rem' }}>BOOKING CONFIRMED</div>
            <p style={{ color: '#888', fontSize: '0.9rem', marginBottom: '1.5rem' }}>
              Your {car.name} is reserved for {days} day{days !== 1 ? 's' : ''}.<br/>
              Total: <strong style={{ color: 'var(--gold)' }}>${totalPrice.toFixed(2)}</strong>
            </p>
            <button className="btn-gold w-100" onClick={onClose}>Done</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="modal-backdrop-custom" onClick={onClose}>
      <div className="modal-box wide" onClick={e => e.stopPropagation()}>
        <div className="modal-header-custom">
          <div className="modal-title-custom">BOOK YOUR CAR</div>
          <button className="modal-close" onClick={onClose}><i className="bi bi-x"></i></button>
        </div>
        <div className="modal-body-custom">
          <div className="booking-car-header">
            <img
              className="booking-car-thumb"
              src={car.imageUrl}
              alt={car.name}
              onError={e => { e.target.src = 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=200&q=60'; }}
            />
            <div>
              <div className="booking-car-name">{car.name}</div>
              <div className="booking-car-sub">
                <i className={`bi ${TYPE_ICONS[car.carType]} me-1`}></i>{car.carType}
                &nbsp;&bull;&nbsp;
                <i className={`bi ${FUEL_ICONS[car.fuelType]} me-1`}></i>{car.fuelType}
                &nbsp;&bull;&nbsp;
                <i className="bi bi-people me-1"></i>{car.seats} seats
              </div>
              <div className="booking-car-sub" style={{ marginTop: '4px' }}>
                <span style={{ color: 'var(--gold)', fontWeight: 600 }}>${car.pricePerDay}</span>/day
              </div>
            </div>
          </div>

          {!user && (
            <div className="alert-custom">
              <i className="bi bi-exclamation-triangle me-1"></i>
              You need to <a onClick={() => { onClose(); onAuthNeeded(); }} style={{ color: '#f87171', cursor: 'pointer', textDecoration: 'underline' }}>sign in</a> to make a booking.
            </div>
          )}

          {error && <div className="alert-custom"><i className="bi bi-x-circle me-1"></i>{error}</div>}

          <div className="row g-3">
            <div className="col-6">
              <div className="form-group-custom">
                <label className="form-label-custom">Pick-up Date</label>
                <input
                  type="date"
                  className="form-control-custom"
                  min={today}
                  value={startDate}
                  onChange={e => { setStartDate(e.target.value); setError(''); }}
                />
              </div>
            </div>
            <div className="col-6">
              <div className="form-group-custom">
                <label className="form-label-custom">Return Date</label>
                <input
                  type="date"
                  className="form-control-custom"
                  min={startDate || today}
                  value={endDate}
                  onChange={e => { setEndDate(e.target.value); setError(''); }}
                />
              </div>
            </div>
          </div>

          {days > 0 && (
            <div className="price-box">
              <div className="price-box-row">
                <span>Rate</span>
                <span>${car.pricePerDay}/day</span>
              </div>
              <div className="price-box-row">
                <span>Duration</span>
                <span>{days} day{days !== 1 ? 's' : ''}</span>
              </div>
              <div className="price-box-total">
                <span className="price-box-total-label">Total</span>
                <span className="price-box-total-val">${totalPrice.toFixed(2)}</span>
              </div>
            </div>
          )}

          <button
            className="btn-gold w-100 mt-2"
            onClick={handleSubmit}
            disabled={loading || !startDate || !endDate || days <= 0}
            style={{ padding: '12px', fontSize: '0.95rem' }}
          >
            {loading
              ? <><span className="spinner-border spinner-border-sm me-2" role="status"></span>Processing...</>
              : <><i className="bi bi-calendar-check me-2"></i>Confirm Booking</>
            }
          </button>
        </div>
      </div>
    </div>
  );
}

// AUTH MODAL
// ──────────────────────────────────────────────────────────────────────────────
function AuthModal({ onClose }) {
  const { login, toast } = useApp();
  const [mode, setMode]       = useState('login'); // 'login' | 'register'
  const [name, setName]       = useState('');
  const [email, setEmail]     = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');

  const reset = () => { setName(''); setEmail(''); setPassword(''); setError(''); };

  const handleSubmit = async () => {
    if (!email || !password || (mode === 'register' && !name)) {
      setError('Please fill in all fields.');
      return;
    }
    setLoading(true);
    setError('');
    try {
      if (mode === 'register') {
        const res = await axios.post(`${API}/users/register`, { name, email, password });
        login(res.data.data);
        toast(`Welcome, ${res.data.data.name}!`, 'success');
      } else {
        const res = await axios.post(`${API}/users/login`, { email, password });
        login(res.data.data);
        toast(`Welcome back, ${res.data.data.name}!`, 'success');
      }
      onClose();
    } catch (e) {
      setError(e.response?.data?.message || 'Something went wrong. Try again.');
    } finally {
      setLoading(false);
    }
  };

  const handleKeyDown = (e) => { if (e.key === 'Enter') handleSubmit(); };

  return (
    <div className="modal-backdrop-custom" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <div className="modal-header-custom">
          <div>
            <div className="modal-title-custom">{mode === 'login' ? 'SIGN IN' : 'REGISTER'}</div>
            <div style={{ fontSize: '0.8rem', color: '#666', marginTop: '2px' }}>
              {mode === 'login' ? 'Access your account' : 'Create your free account'}
            </div>
          </div>
          <button className="modal-close" onClick={onClose}><i className="bi bi-x"></i></button>
        </div>
        <div className="modal-body-custom">
          {error && <div className="alert-custom"><i className="bi bi-x-circle me-1"></i>{error}</div>}

          {mode === 'register' && (
            <div className="form-group-custom">
              <label className="form-label-custom">Full Name</label>
              <input
                className="form-control-custom"
                placeholder="John Doe"
                value={name}
                onChange={e => { setName(e.target.value); setError(''); }}
                onKeyDown={handleKeyDown}
              />
            </div>
          )}

          <div className="form-group-custom">
            <label className="form-label-custom">Email Address</label>
            <input
              type="email"
              className="form-control-custom"
              placeholder="you@example.com"
              value={email}
              onChange={e => { setEmail(e.target.value); setError(''); }}
              onKeyDown={handleKeyDown}
            />
          </div>

          <div className="form-group-custom">
            <label className="form-label-custom">Password</label>
            <input
              type="password"
              className="form-control-custom"
              placeholder={mode === 'register' ? 'Min. 6 characters' : '••••••••'}
              value={password}
              onChange={e => { setPassword(e.target.value); setError(''); }}
              onKeyDown={handleKeyDown}
            />
          </div>

          <button
            className="btn-gold w-100 mt-1"
            onClick={handleSubmit}
            disabled={loading}
            style={{ padding: '12px', fontSize: '0.95rem' }}
          >
            {loading
              ? <><span className="spinner-border spinner-border-sm me-2" role="status"></span>Please wait...</>
              : mode === 'login' ? <><i className="bi bi-box-arrow-in-right me-2"></i>Sign In</> : <><i className="bi bi-person-plus me-2"></i>Create Account</>
            }
          </button>

          <div className="modal-switch">
            {mode === 'login'
              ? <>Don't have an account? <a onClick={() => { setMode('register'); reset(); }}>Register here</a></>
              : <>Already have an account? <a onClick={() => { setMode('login'); reset(); }}>Sign in</a></>
            }
          </div>
        </div>
      </div>
    </div>
  );
}

// HOME PAGE
// ──────────────────────────────────────────────────────────────────────────────
function HomePage() {
  const [cars, setCars]       = useState([]);
  const [loading, setLoading] = useState(true);
  const [filters, setFilters] = useState({ carType: '', fuelType: '', minPrice: '', maxPrice: '' });
  const [selectedCar, setSelectedCar] = useState(null);
  const [showAuth, setShowAuth]       = useState(false);
  const timerRef = useRef(null);

  const fetchCars = useCallback(async (f) => {
    setLoading(true);
    try {
      const params = {};
      if (f.carType)  params.carType  = f.carType;
      if (f.fuelType) params.fuelType = f.fuelType;
      if (f.minPrice) params.minPrice = f.minPrice;
      if (f.maxPrice) params.maxPrice = f.maxPrice;
      const res = await axios.get(`${API}/cars`, { params });
      setCars(res.data.data || []);
    } catch {
      setCars([]);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { fetchCars(filters); }, []);

  const handleFilterChange = (key, val) => {
    const next = { ...filters, [key]: val };
    setFilters(next);
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => fetchCars(next), 500);
  };

  const handleReset = () => {
    const reset = { carType: '', fuelType: '', minPrice: '', maxPrice: '' };
    setFilters(reset);
    fetchCars(reset);
  };

  return (
    <>
      <HeroCarousel />

      <FilterBar
        filters={filters}
        onChange={handleFilterChange}
        onReset={handleReset}
        total={cars.length}
        loading={loading}
      />

      <div className="container" style={{ paddingTop: '2.5rem', paddingBottom: '3rem' }}>
        <div className="d-flex align-items-end justify-content-between mb-4">
          <div>
            <div className="section-title">AVAILABLE <span>FLEET</span></div>
            <div className="section-sub">Choose your perfect ride</div>
          </div>
        </div>

        {loading ? (
          <div className="text-center py-5">
            <div className="spinner-border spinner-gold" role="status"></div>
            <div style={{ color: '#555', marginTop: '1rem', fontSize: '0.9rem' }}>Loading fleet...</div>
          </div>
        ) : cars.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon"><i className="bi bi-car-front"></i></div>
            <div className="empty-title">No Cars Found</div>
            <div className="empty-sub">Try adjusting your filters</div>
            <button className="btn-gold mt-3" onClick={handleReset}>Clear Filters</button>
          </div>
        ) : (
          <div className="row g-4">
            {cars.map(car => (
              <div key={car._id} className="col-12 col-sm-6 col-lg-4 col-xl-3">
                <CarCard car={car} onBook={setSelectedCar} />
              </div>
            ))}
          </div>
        )}
      </div>

      {selectedCar && (
        <BookingModal
          car={selectedCar}
          onClose={() => setSelectedCar(null)}
          onAuthNeeded={() => setShowAuth(true)}
        />
      )}
      {showAuth && <AuthModal onClose={() => setShowAuth(false)} />}
    </>
  );
}

  cancelled: { label: 'Cancelled', cls: 'status-cancelled' },

function fmtDate(d) {
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

                      className="booking-thumb"
                      src={car.imageUrl}
                      alt={car.name}
                      onError={e => { e.target.src = 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=200&q=60'; }}
                    />
                  ) : (
                    <div className="booking-thumb" style={{ background: 'var(--dark-4)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#444' }}>
                      <i className="bi bi-car-front" style={{ fontSize: '2rem' }}></i>
                    </div>
                  )}
                  <div className="booking-info">
                    <div className="booking-car-title">{car?.name || 'Unknown Car'}</div>
                    {car && (
                      <div className="booking-dates" style={{ marginBottom: '4px' }}>
                        <i className={`bi ${TYPE_ICONS[car.carType] || 'bi-car-front'} me-1`}></i>{car.carType}
                        &nbsp;&bull;&nbsp;
                        <i className={`bi ${FUEL_ICONS[car.fuelType] || 'bi-fuel-pump'} me-1`}></i>{car.fuelType}
                      </div>
                    )}
                    <div className="booking-dates">
                      <i className="bi bi-calendar-range me-1"></i>
                      {fmtDate(b.startDate)} &rarr; {fmtDate(b.endDate)}
                      {days ? ` (${days} day${days !== 1 ? 's' : ''})` : ''}
                    </div>
                    <span className={`status-pill ${st.cls}`}>{st.label}</span>
                  </div>
                  <div className="text-end flex-shrink-0">
                    <div className="booking-price">${b.totalPrice?.toFixed(2)}</div>
                    <div style={{ fontSize: '0.75rem', color: '#666', marginTop: '2px' }}>total</div>
                    <div style={{ fontSize: '0.72rem', color: '#555', marginTop: '6px' }}>
                      Booked {fmtDate(b.createdAt)}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </>
  );
}

// ──────────────────────────────────────────────────────────────────────────────
// APP SHELL
// ──────────────────────────────────────────────────────────────────────────────
function AppShell() {
  const [showAuth, setShowAuth] = useState(false);

  return (
    <>
      <Navbar onAuthClick={() => setShowAuth(true)} />
      <Switch>
        <Route exact path="/" component={HomePage} />
        <Route path="/my-bookings" component={MyBookingsPage} />
        <Route render={() => (
          <div className="empty-state" style={{ paddingTop: '8rem' }}>
            <div className="empty-icon"><i className="bi bi-signpost-split"></i></div>
            <div className="empty-title">PAGE NOT FOUND</div>
            <div className="empty-sub">This road doesn't exist.</div>
            <Link to="/" style={{ textDecoration: 'none' }}>
              <button className="btn-gold mt-3">Back to Home</button>
            </Link>
          </div>
        )} />
      </Switch>

      <footer className="site-footer">
        <div className="brand">NEX<span style={{ color: 'var(--gold)' }}>.</span>RENTALHUB</div>
        <div>&copy; {new Date().getFullYear()} Nex.RentalHub. All rights reserved.</div>
      </footer>

      {showAuth && <AuthModal onClose={() => setShowAuth(false)} />}
    </>
  );
}

// ──────────────────────────────────────────────────────────────────────────────
// ROOT
// ──────────────────────────────────────────────────────────────────────────────
function App() {
  return (
    <BrowserRouter>
      <AppProvider>
        <AppShell />
      </AppProvider>
    </BrowserRouter>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
